<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
        // Variables for system state
        let currentProfile = null;
        let currentRows = [];
        const namaMeal = { pagi: 'Pagi', siang: 'Siang', malam: 'Malam' };
        const mealBadgeColor = {
            pagi: 'bg-amber-100 text-amber-700',
            siang: 'bg-sky-100 text-sky-700',
            malam: 'bg-indigo-100 text-indigo-700'
        };
        const namaProduk = { tahanan: 'Tahanan', anggota: 'Anggota' };
        const mealOrder = { pagi: 0, siang: 1, malam: 2 };

        // Helper functions
        function todayStr() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function showTab(tab) {
            ['monitoring', 'laporan', 'akun'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                const btn = document.getElementById(`tab-btn-${t}`);
                if (t === tab) {
                    el?.classList.remove('hidden');
                    btn?.classList.add('active-gold-border', 'font-bold');
                    btn?.classList.remove('text-on-surface-variant');
                    btn?.classList.add('text-primary-fixed-dim');
                } else {
                    el?.classList.add('hidden');
                    btn?.classList.remove('active-gold-border', 'font-bold');
                    btn?.classList.add('text-on-surface-variant');
                    btn?.classList.remove('text-primary-fixed-dim');
                }
            });
            if (tab === 'akun') loadUsers();
        }

        function showLaporanSubTab(sub) {
            ['harian', 'bulanan'].forEach(s => {
                const el = document.getElementById(`subtab-${s}`);
                const btn = document.getElementById(`subtab-btn-${s}`);
                if (s === sub) {
                    el?.classList.remove('hidden');
                    btn?.classList.add('active', 'border-sm-gold', 'bg-surface-container-low');
                } else {
                    el?.classList.add('hidden');
                    btn?.classList.remove('active', 'border-sm-gold', 'bg-surface-container-low');
                }
            });
        }

        function computeStatusSiklus(row) {
            if (!row.log_id) return { key: 'belum_produksi', label: 'Belum Produksi', cls: 'bg-surface-container-highest text-outline' };
            const sudahDikirim = row.qty_received !== null;
            if (row.status === 'approved') return { key: 'selesai', label: 'Selesai', cls: 'bg-done-bg text-done-text border border-done-text/20' };
            if (sudahDikirim) return { key: 'terkirim', label: 'Terkirim', cls: 'bg-secondary-container text-on-secondary-container' };
            return { key: 'siap_kirim', label: 'Siap Kirim', cls: 'bg-sm-gold/20 text-secondary-fixed-dim border border-sm-gold' };
        }

        async function loadData() {
            const tanggal = document.getElementById('date-picker').value;
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '<tr><td colspan="13" class="p-12 text-center text-outline-variant"><div class="flex flex-col items-center gap-4"><div class="w-12 h-12 border-4 border-sm-blue border-t-transparent rounded-full animate-spin"></div><span class="font-headline-md text-primary">Memuat data operasional...</span></div></td></tr>';

            const { data: lp, error: lpErr } = await supabaseClient.from('location_products').select('location_id, product_type, meal_time, locations(nama)').order('location_id');
            const { data: pl, error: plErr } = await supabaseClient.from('production_logs').select('id, location_id, product_type, meal_time, qty_produced, status, users!input_by(nama), approved_user:users!approved_by(nama)').eq('tanggal', tanggal);

            if (lpErr || plErr) {
                tableBody.innerHTML = '<tr><td colspan="13" class="p-10 text-center text-error">Gagal memuat data dari database. Silahkan refresh.</td></tr>';
                return;
            }

            const logIds = pl.map(p => p.id);
            let dl = [];
            if (logIds.length > 0) {
                const { data: dls } = await supabaseClient.from('delivery_logs').select('production_log_id, qty_received, retur, photo_url, gps_lat, gps_lng, receiver_name, users!submitted_by(nama)').in('production_log_id', logIds);
                dl = dls || [];
            }

            currentRows = lp.map(item => {
                const prod = pl.find(p => p.location_id === item.location_id && p.product_type === item.product_type && p.meal_time === item.meal_time);
                const delivery = prod ? dl.find(d => d.production_log_id === prod.id) : null;
                return {
                    location_nama: item.locations.nama,
                    product_type: item.product_type,
                    meal_time: item.meal_time,
                    log_id: prod ? prod.id : null,
                    qty_produced: prod ? prod.qty_produced : null,
                    status: prod ? prod.status : null,
                    input_by_nama: prod?.users?.nama,
                    approved_by_nama: prod?.approved_user?.nama,
                    delivered_by_nama: delivery?.users?.nama,
                    qty_received: delivery ? delivery.qty_received : null,
                    retur: delivery ? delivery.retur : null,
                    receiver_name: delivery ? delivery.receiver_name : null,
                    photo_url: delivery ? delivery.photo_url : null,
                    gps_lat: delivery ? delivery.gps_lat : null,
                    gps_lng: delivery ? delivery.gps_lng : null
                };
            });

            currentRows.sort((a, b) => a.location_nama.localeCompare(b.location_nama) || a.product_type.localeCompare(b.product_type) || mealOrder[a.meal_time] - mealOrder[b.meal_time]);
            renderTable();
        }

        function renderTable() {
            const fLokasi = document.getElementById('filter-lokasi').value;
            const fProduk = document.getElementById('filter-produk').value;
            const fMeal = document.getElementById('filter-meal').value;
            const fStatus = document.getElementById('filter-status').value;

            const filtered = currentRows.filter(r => {
                if (fLokasi && r.location_nama !== fLokasi) return false;
                if (fProduk && r.product_type !== fProduk) return false;
                if (fMeal && r.meal_time !== fMeal) return false;
                if (fStatus && computeStatusSiklus(r).key !== fStatus) return false;
                return true;
            });

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="13" class="p-10 text-center text-outline">Tidak ada data operasional yang sesuai dengan filter.</td></tr>';
                updateApproveButton();
                return;
            }

            filtered.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-surface-container-low transition-colors group";
                const siklus = computeStatusSiklus(row);

                const qtyDisplay = row.log_id 
                    ? `<div class="flex items-center gap-2" id="qtycell-${row.log_id}">
                         <span class="font-bold text-primary">${row.qty_produced}</span>
                         <button onclick="enableEditQty('${row.log_id}', ${row.qty_produced})" class="opacity-0 group-hover:opacity-100 material-symbols-outlined text-xs p-1 rounded hover:bg-surface-container-high transition-all">edit</button>
                       </div>`
                    : '<span class="text-outline-variant">—</span>';

                const mediaActions = row.photo_url 
                    ? `<div class="flex gap-2">
                        <a href="${row.photo_url}" target="_blank" class="p-2 rounded-full bg-surface-container border border-outline-variant hover:bg-sm-gold/10 hover:text-sm-gold transition-all" title="Lihat Foto"><span class="material-symbols-outlined text-sm">image</span></a>
                        <a href="https://www.google.com/maps?q=${row.gps_lat},${row.gps_lng}" target="_blank" class="p-2 rounded-full bg-surface-container border border-outline-variant hover:bg-primary/10 hover:text-primary transition-all" title="Buka GPS"><span class="material-symbols-outlined text-sm">location_on</span></a>
                       </div>`
                    : '<span class="text-outline-variant">—</span>';

                const rowAction = (siklus.key === 'terkirim')
                    ? `<div class="flex items-center gap-3">
                        <input type="checkbox" class="approve-checkbox w-4 h-4 rounded border-outline-variant text-sm-gold focus:ring-sm-gold" data-log-id="${row.log_id}" onchange="updateApproveButton()">
                        <button onclick="approveSingle('${row.log_id}')" class="bg-sm-gold text-on-secondary px-3 py-1 rounded text-xs font-bold hover:brightness-110 transition-all">Approve</button>
                       </div>`
                    : `<span class="text-outline-variant text-[10px] uppercase font-bold tracking-tighter">Dikunci</span>`;

                tr.innerHTML = `
                    <td class="p-4 font-bold text-primary table-sticky-col">${row.location_nama}</td>
                    <td class="p-4">${namaProduk[row.product_type]}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs uppercase font-bold ${mealBadgeColor[row.meal_time]}">${namaMeal[row.meal_time]}</span></td>
                    <td class="p-4">${qtyDisplay}</td>
                    <td class="p-4"><span class="badge px-3 py-1 rounded-full font-bold text-[10px] uppercase tracking-wide shadow-sm ${siklus.cls}">${siklus.label}</span></td>
                    <td class="p-4 text-xs font-medium">${row.input_by_nama || '—'}</td>
                    <td class="p-4 text-xs font-medium">${row.approved_by_nama || '—'}</td>
                    <td class="p-4 text-xs font-medium">${row.delivered_by_nama || '—'}</td>
                    <td class="p-4 font-bold">${row.qty_received ?? '—'}</td>
                    <td class="p-4"><span class="${row.retur > 0 ? 'text-error font-bold' : 'text-outline-variant'}">${row.retur ?? '—'}</span></td>
                    <td class="p-4 text-xs italic">${row.receiver_name || '—'}</td>
                    <td class="p-4">${mediaActions}</td>
                    <td class="p-4">${rowAction}</td>
                `;
                tbody.appendChild(tr);
            });
            updateApproveButton();
        }

        function updateApproveButton() {
            const checked = document.querySelectorAll('.approve-checkbox:checked').length;
            const btn = document.getElementById('btn-approve');
            btn.innerHTML = `<span class="material-symbols-outlined text-base">check_circle</span> Approve Terpilih (${checked})`;
            btn.disabled = checked === 0;
        }

        async function approveSingle(id) {
            const { error } = await supabaseClient.from('production_logs').update({ status: 'approved', approved_by: currentProfile.id, approved_at: new Date().toISOString() }).eq('id', id);
            if (!error) {
                showPopup("Data berhasil disetujui.");
                loadData();
            }
        }

        async function approveSelected() {
            const ids = Array.from(document.querySelectorAll('.approve-checkbox:checked')).map(el => el.dataset.logId);
            const { error } = await supabaseClient.from('production_logs').update({ status: 'approved', approved_by: currentProfile.id, approved_at: new Date().toISOString() }).in('id', ids);
            if (!error) {
                showPopup(`${ids.length} data operasional berhasil disetujui secara massal.`);
                loadData();
            }
        }

        function enableEditQty(id, current) {
            const cell = document.getElementById(`qtycell-${id}`);
            cell.innerHTML = `
                <div class="flex items-center gap-1">
                    <input type="number" id="input-qty-${id}" value="${current}" class="w-16 p-1 text-xs border-outline-variant rounded focus:ring-primary">
                    <button onclick="saveQty('${id}')" class="bg-primary-container text-on-primary p-1 rounded"><span class="material-symbols-outlined text-xs">check</span></button>
                    <button onclick="loadData()" class="bg-surface-variant p-1 rounded"><span class="material-symbols-outlined text-xs">close</span></button>
                </div>
            `;
        }

        async function saveQty(id) {
            const val = document.getElementById(`input-qty-${id}`).value;
            await supabaseClient.from('production_logs').update({ qty_produced: parseInt(val) }).eq('id', id);
            loadData();
        }

        function showPopup(msg) {
            document.getElementById('popup-message').innerText = msg;
            document.getElementById('popup-overlay').classList.remove('hidden');
        }
        function closePopup() { document.getElementById('popup-overlay').classList.add('hidden'); }

        async function loadUsers() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center">Memuat daftar akun...</td></tr>';
            const { data, error } = await supabaseClient.from('users').select('id, nama, role, email, is_active').order('nama');
            if (error) return;
            
            tbody.innerHTML = '';
            data.forEach(u => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-surface-container-low transition-all";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-primary">${u.nama}</td>
                    <td class="p-4 text-xs uppercase tracking-widest font-bold text-outline">${u.role}</td>
                    <td class="p-4 text-sm">${u.email}</td>
                    <td class="p-4"><span class="badge px-2 py-1 rounded text-[10px] font-bold uppercase ${u.is_active ? 'bg-done-bg text-done-text' : 'bg-surface-variant text-outline'}">${u.is_active ? 'Aktif' : 'Nonaktif'}</span></td>
                    <td class="p-4 text-right">
                        <button onclick="toggleActive('${u.id}', ${u.is_active})" class="text-sm font-bold ${u.is_active ? 'text-error' : 'text-primary'} hover:underline">
                            ${u.is_active ? 'Nonaktifkan' : 'Aktifkan'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function toggleActive(id, status) {
            await supabaseClient.from('users').update({ is_active: !status }).eq('id', id);
            loadUsers();
        }

        // Init process
        (async () => {
            currentProfile = await requireAuth(['admin', 'superuser']);
            if (currentProfile) {
                renderUserHeader(currentProfile);

                document.getElementById('date-picker').value = todayStr();
                document.getElementById('date-picker-laporan').value = todayStr();
                document.getElementById('month-picker-bulanan').value = todayStr().slice(0, 7);

                document.getElementById('date-picker').addEventListener('change', loadData);
                document.getElementById('filter-lokasi').addEventListener('change', renderTable);
                document.getElementById('filter-produk').addEventListener('change', renderTable);
                document.getElementById('filter-meal').addEventListener('change', renderTable);
                document.getElementById('filter-status').addEventListener('change', renderTable);

                if (currentProfile.role === 'superuser') {
                    document.getElementById('tab-btn-akun').classList.remove('hidden');
                }
                loadData();
            }
        })();

        function formatTanggalIndo(dateStr) {
            const bulanIndo = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            const [y, m, d] = dateStr.split('-').map(Number);
            return `${d} ${bulanIndo[m - 1]} ${y}`;
        }

        async function generateLaporanHarian() {
            const tanggal = document.getElementById('date-picker-laporan').value;
            const output = document.getElementById('laporan-output');
            const statusLine = document.getElementById('status-line-laporan');
            statusLine.innerText = "Menyusun rekap harian...";
            output.value = '';

            const { data: lp, error: lpErr } = await supabaseClient
                .from('location_products')
                .select('location_id, product_type, meal_time, locations(nama)')
                .order('location_id');

            const { data: pl, error: plErr } = await supabaseClient
                .from('production_logs')
                .select('id, location_id, product_type, meal_time, qty_produced, status')
                .eq('tanggal', tanggal);

            if (lpErr || plErr) {
                statusLine.innerText = "Gagal memuat data: " + (lpErr ? lpErr.message : plErr.message);
                return;
            }

            const logIds = pl.map(p => p.id);
            let dl = [];
            if (logIds.length > 0) {
                const { data: dls } = await supabaseClient
                    .from('delivery_logs')
                    .select('production_log_id, qty_received, retur')
                    .in('production_log_id', logIds);
                dl = dls || [];
            }

            const rows = lp.map(item => {
                const prod = pl.find(p => p.location_id === item.location_id && p.product_type === item.product_type && p.meal_time === item.meal_time);
                const delivery = prod ? dl.find(d => d.production_log_id === prod.id) : null;
                return {
                    location_nama: item.locations.nama,
                    product_type: item.product_type,
                    meal_time: item.meal_time,
                    qty_produced: prod ? prod.qty_produced : null,
                    status: prod ? prod.status : null,
                    qty_received: delivery ? delivery.qty_received : null,
                    retur: delivery ? delivery.retur : null
                };
            });

            const totalItem = rows.length;
            const sudahProduksi = rows.filter(r => r.qty_produced !== null).length;
            const sudahKirim = rows.filter(r => r.qty_received !== null).length;
            const sudahApprove = rows.filter(r => r.status === 'approved').length;

            const byLokasi = {};
            rows.forEach(r => {
                if (!byLokasi[r.location_nama]) byLokasi[r.location_nama] = [];
                byLokasi[r.location_nama].push(r);
            });

            let text = `*📋 LAPORAN HARIAN PRODUKSI & DISTRIBUSI — SM CATERING*\n`;
            text += `Tanggal: ${formatTanggalIndo(tanggal)}\n\n`;
            text += `*Ringkasan:*\n`;
            text += `Total jadwal: ${totalItem}\n`;
            text += `Sudah produksi: ${sudahProduksi}/${totalItem}\n`;
            text += `Sudah dikirim: ${sudahKirim}/${totalItem}\n`;
            text += `Sudah disetujui: ${sudahApprove}/${totalItem}\n\n`;
            text += `*Detail per Lokasi:*\n`;

            Object.keys(byLokasi).sort().forEach(loc => {
                text += `\n📍 *${loc}*\n`;
                byLokasi[loc]
                    .sort((a, b) => mealOrder[a.meal_time] - mealOrder[b.meal_time])
                    .forEach(r => {
                        const label = `${namaProduk[r.product_type]} ${namaMeal[r.meal_time]}`;
                        if (r.qty_produced === null) {
                            text += `- ${label}: belum ada input produksi\n`;
                            return;
                        }
                        let statusText = 'siap kirim';
                        if (r.qty_received !== null) statusText = r.status === 'approved' ? 'selesai & disetujui' : 'sudah terkirim';
                        const returText = r.retur > 0 ? `, retur ${r.retur}` : '';
                        text += `- ${label}: ${r.qty_produced} porsi (${statusText}${returText})\n`;
                    });
            });

            const belumInput = rows.filter(r => r.qty_produced === null);
            if (belumInput.length > 0) {
                text += `\n*Catatan — belum ada input produksi:*\n`;
                belumInput.forEach(r => {
                    text += `- ${r.location_nama} (${namaProduk[r.product_type]} ${namaMeal[r.meal_time]})\n`;
                });
            }

            output.value = text;
            statusLine.innerText = "Laporan berhasil disusun.";
        }

        function copyLaporan() {
            const area = document.getElementById('laporan-output');
            area.select();
            document.execCommand('copy');
            showPopup("Teks laporan disalin ke clipboard.");
        }

        async function loadLaporanBulanan() {
            const bulan = document.getElementById('month-picker-bulanan').value;
            const container = document.getElementById('bulanan-content');
            const statusLine = document.getElementById('status-line-bulanan');
            statusLine.innerText = "Memproses rekapitulasi...";
            container.innerHTML = `<div class="p-20 text-center"><div class="w-10 h-10 border-4 border-sm-gold border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>Memproses rekapitulasi ${bulan}...</div>`;

            const [y, m] = bulan.split('-').map(Number);
            const startDate = `${bulan}-01`;
            const lastDay = new Date(y, m, 0).getDate();
            const endDate = `${bulan}-${String(lastDay).padStart(2, '0')}`;

            const { data: pl, error } = await supabaseClient
                .from('production_logs')
                .select('id, product_type, qty_produced, locations(nama)')
                .gte('tanggal', startDate)
                .lte('tanggal', endDate);

            if (error) {
                container.innerHTML = `<div class="p-10 text-center text-error">Gagal memuat rekap: ${error.message}</div>`;
                statusLine.innerText = '';
                return;
            }

            if (!pl || pl.length === 0) {
                container.innerHTML = `<div class="bg-surface rounded-xl border border-outline-variant p-10 text-center italic text-outline">Belum ada data produksi untuk periode ${bulan}.</div>`;
                statusLine.innerText = '';
                return;
            }

            const logIds = pl.map(p => p.id);
            let dl = [];
            if (logIds.length > 0) {
                const { data: dls } = await supabaseClient
                    .from('delivery_logs')
                    .select('production_log_id, qty_received, retur')
                    .in('production_log_id', logIds);
                dl = dls || [];
            }
            const deliveryByLog = {};
            dl.forEach(d => { deliveryByLog[d.production_log_id] = d; });

            const agg = {};
            pl.forEach(row => {
                const key = `${row.locations.nama}|${row.product_type}`;
                if (!agg[key]) agg[key] = { location: row.locations.nama, product: row.product_type, qty_produced: 0, qty_received: 0, retur: 0 };
                agg[key].qty_produced += row.qty_produced;
                const d = deliveryByLog[row.id];
                if (d) {
                    agg[key].qty_received += d.qty_received;
                    agg[key].retur += d.retur;
                }
            });

            const rows = Object.values(agg).sort((a, b) => a.location.localeCompare(b.location) || a.product.localeCompare(b.product));

            let html = `<div class="bg-surface rounded-xl border border-outline-variant shadow-lg overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-surface-container-low border-b border-outline-variant">
                            <th class="p-4 font-label-sm text-outline uppercase tracking-widest text-xs">Lokasi</th>
                            <th class="p-4 font-label-sm text-outline uppercase tracking-widest text-xs">Produk</th>
                            <th class="p-4 font-label-sm text-outline uppercase tracking-widest text-xs">Total Produksi</th>
                            <th class="p-4 font-label-sm text-outline uppercase tracking-widest text-xs">Total Diterima</th>
                            <th class="p-4 font-label-sm text-outline uppercase tracking-widest text-xs">Total Retur</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-outline-variant">`;
            rows.forEach(r => {
                html += `<tr class="hover:bg-surface-container-low transition-colors">
                    <td class="p-4 font-bold text-primary">${r.location}</td>
                    <td class="p-4">${namaProduk[r.product]}</td>
                    <td class="p-4 font-bold">${r.qty_produced}</td>
                    <td class="p-4">${r.qty_received}</td>
                    <td class="p-4 ${r.retur > 0 ? 'text-error font-bold' : 'text-outline-variant'}">${r.retur}</td>
                </tr>`;
            });
            html += `</tbody></table></div>`;

            container.innerHTML = html;
            statusLine.innerText = `Rekap ${rows.length} baris untuk periode ${bulan}.`;
        }

    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body></html>
