<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-secondary": "#ffffff",
                "on-secondary-fixed": "#261900",
                "surface": "#f8f9fa",
                "primary-container": "#001a72",
                "on-tertiary": "#ffffff",
                "on-primary": "#ffffff",
                "primary": "#000a3f",
                "surface-variant": "#e1e3e4",
                "surface-container": "#edeeef",
                "on-background": "#191c1d",
                "on-primary-fixed": "#001258",
                "on-primary-fixed-variant": "#2d3f93",
                "on-error": "#ffffff",
                "tertiary-container": "#262626",
                "inverse-surface": "#2e3132",
                "inverse-primary": "#b9c3ff",
                "primary-fixed-dim": "#b9c3ff",
                "on-surface-variant": "#454651",
                "tertiary": "#111111",
                "on-primary-container": "#7688e0",
                "surface-container-low": "#f3f4f5",
                "on-tertiary-container": "#8e8d8c",
                "error-container": "#ffdad6",
                "on-surface": "#191c1d",
                "surface-dim": "#d9dadb",
                "primary-fixed": "#dee1ff",
                "background": "#f8f9fa",
                "secondary": "#775a19",
                "secondary-fixed-dim": "#e9c176",
                "secondary-container": "#fed488",
                "on-secondary-fixed-variant": "#5d4201",
                "surface-container-lowest": "#ffffff",
                "surface-bright": "#f8f9fa",
                "on-error-container": "#93000a",
                "surface-tint": "#4658ac",
                "inverse-on-surface": "#f0f1f2",
                "tertiary-fixed-dim": "#c8c6c5",
                "secondary-fixed": "#ffdea5",
                "error": "#ba1a1a",
                "on-secondary-container": "#785a1a",
                "outline": "#757683",
                "surface-container-highest": "#e1e3e4",
                "on-tertiary-fixed-variant": "#474646",
                "tertiary-fixed": "#e5e2e1",
                "on-tertiary-fixed": "#1c1b1b",

                "sm-gold": "#C8A24B"

        "fontFamily": {

<style>
  body {
    background-color: #000a3f;
    background-image: radial-gradient(rgba(255, 255, 255, 0.05) 0.5px, transparent 0.5px);
    background-size: 20px 20px;
  }
  .gold-gradient {
    background: linear-gradient(135deg, #D4AF37 0%, #C8A24B 50%, #B8860B 100%);
  }
  .gold-shadow {
    box-shadow: 0 4px 14px 0 rgba(200, 162, 75, 0.3);
  }
  .pin-input {
    letter-spacing: 0.75em;
    text-indent: 0.375em;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 font-sans">
<div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/10 animate-in fade-in slide-in-from-bottom-4 duration-500">
<!-- Top Navigation/Accent Bar -->
<div class="h-1.5 gold-gradient w-full"></div>
<!-- Header Navigation -->
<div class="px-8 pt-6 flex justify-between items-center">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant" onclick="logout()" title="Keluar">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="text-[10px] text-on-surface-variant uppercase tracking-[0.2em] font-bold">SM Catering</span>
</div>
<div class="p-8 pt-4 sm:p-10 sm:pt-6">
<div class="mb-8">
<h1 class="text-3xl font-serif font-bold text-sm-blue mb-2">Halo, <span class="text-sm-gold" id="nama-user">...</span></h1>
<p class="text-sm text-on-surface-variant leading-relaxed">PIN kamu masih bersifat sementara. Mohon ganti ke PIN pribadi Anda demi keamanan akun.</p>
</div>
<div class="space-y-6">
<div class="hidden bg-error-container text-on-error-container p-4 rounded-xl text-sm flex items-start gap-3 border border-error/10" id="error-ganti">
<span class="material-symbols-outlined text-lg shrink-0">error</span>
<span id="error-text"></span>
</div>
<div class="space-y-4">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="pin-baru">PIN Baru (6 Digit)</label>
<input class="pin-input w-full px-4 py-4 text-2xl font-bold text-center bg-surface-container-low border border-outline-variant rounded-2xl focus:ring-2 focus:ring-sm-gold focus:border-sm-gold transition-all outline-none text-sm-blue" id="pin-baru" inputmode="numeric" maxlength="6" pattern="[0-9]*" placeholder="••••••" type="tel"/>
</div>
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="pin-konfirmasi">Konfirmasi PIN</label>
<input class="pin-input w-full px-4 py-4 text-2xl font-bold text-center bg-surface-container-low border border-outline-variant rounded-2xl focus:ring-2 focus:ring-sm-gold focus:border-sm-gold transition-all outline-none text-sm-blue" id="pin-konfirmasi" inputmode="numeric" maxlength="6" pattern="[0-9]*" placeholder="••••••" type="tel"/>
</div>
</div>
<button class="gold-gradient gold-shadow w-full py-4 rounded-2xl text-white font-bold text-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" onclick="submitGantiPin()">
<span>Simpan PIN Baru</span>
<span class="material-symbols-outlined">lock_reset</span>
</button>
</div>
</div>
<div class="bg-surface-container-low p-4 text-center border-t border-outline-variant">
<p class="text-[10px] text-on-surface-variant uppercase tracking-[0.2em] font-bold">SM Catering Premium Identity</p>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
  let currentProfile = null;

  (async () => {
    currentProfile = await requireAuth(null);
    if (currentProfile) {
      document.getElementById('nama-user').textContent = currentProfile.nama;
    }
  })();

  function showError(pesan) {
    const el = document.getElementById('error-ganti');
    const textEl = document.getElementById('error-text');
    textEl.textContent = pesan;
    el.classList.remove('hidden');
    el.classList.add('flex');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function submitGantiPin() {
    const pin1 = document.getElementById('pin-baru').value;
    const pin2 = document.getElementById('pin-konfirmasi').value;

    if (!/^\d{6}$/.test(pin1)) {
      showError('PIN harus 6 digit angka.');
      return;
    }
    if (pin1 !== pin2) {
      showError('Konfirmasi PIN tidak cocok.');
      return;
    }

    const { error: authError } = await supabaseClient.auth.updateUser({ password: pin1 });
    if (authError) {
      showError('Gagal ganti PIN: ' + authError.message);
      return;
    }

    const { error: dbError } = await supabaseClient
      .from('users')
      .update({ pin_is_temp: false })
      .eq('id', currentProfile.id);

    if (dbError) {
      showError('PIN berhasil diganti tapi ada masalah menyimpan status. Hubungi Admin.');
      return;
    }

    window.location.href = 'index.html';
  }

</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body></html>
