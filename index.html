<style>
  :root {
    --sm-blue: #001a72;
    --sm-blue-dark: #00124f;
    --sm-blue-light: #e6e9f1;
    --luminous-gold: #C8A24B;
    --gold-light: #F7EFDD;
    --bg-surface: #F8F9FA;
    --text-primary: #1A1C1E;
    --text-secondary: #44474E;
    --border-color: #DDE2EA;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-surface);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .heading-serif {
    font-family: 'Libre Caslon Text', serif;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 26, 114, 0.08);
  }
  input:focus {
    outline: none;
    border-color: var(--sm-blue) !important;
    box-shadow: 0 0 0 3px rgba(0, 26, 114, 0.1) !important;
  }
  .btn-sm-primary {
    background: var(--sm-blue);
    color: white;
    transition: all 0.2s ease;
  }
  .btn-sm-primary:active {
    transform: scale(0.98);
    background: var(--sm-blue-dark);
  }
  .fungsi-card {
    background: white;
    border: 1px solid var(--border-color);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .fungsi-card:active {
    transform: translateY(2px);
    border-color: var(--sm-blue);
    background: var(--sm-blue-light);
  }
  .hidden { display: none; }
  @keyframes fadeSlideIn { 
    from { opacity: 0; transform: translateY(12px); } 
    to { opacity: 1; transform: translateY(0); } 
  }
  .animate-in { animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
  const LAST_EMAIL_KEY = 'sm_last_email';
  const PIN_DOMAINS = /@(smc\.com|mitrasm\.com)$/i;

  function showScreen(id) {
    document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function toggleAksesLain() {
    document.getElementById('hint-akses-lain').classList.toggle('hidden');
  }

  function showError(elId, pesan) {
    const errorContainer = document.getElementById('error-login');
    const errorText = document.getElementById('error-login-text');
    errorText.textContent = pesan;
    errorContainer.classList.remove('hidden');
  }

  function adjustPinField() {
    const email = document.getElementById('input-email').value.trim();
    const pinField = document.getElementById('input-pin');
    const label = document.getElementById('label-pin');
    if (PIN_DOMAINS.test(email)) {
      pinField.type = 'password';
      pinField.setAttribute('inputmode', 'numeric');
      pinField.setAttribute('pattern', '[0-9]*');
      pinField.setAttribute('maxlength', '6');
      pinField.placeholder = '••••••';
      pinField.style.letterSpacing = '0.6em';
      label.textContent = 'PIN';
    } else {
      pinField.type = 'password';
      pinField.removeAttribute('inputmode');
      pinField.removeAttribute('pattern');
      pinField.removeAttribute('maxlength');
      pinField.placeholder = 'Password';
      pinField.style.letterSpacing = '0.1em';
      label.textContent = 'Password Superuser';
    }
    resetPinVisibility();
  }

  function togglePinVisibility() {
    const pinField = document.getElementById('input-pin');
    const icon = document.querySelector('#btn-toggle-pin span');
    if (pinField.type === 'password') {
      pinField.type = 'text';
      icon.textContent = 'visibility';
    } else {
      pinField.type = 'password';
      icon.textContent = 'visibility_off';
    }
  }

  function resetPinVisibility() {
    const icon = document.querySelector('#btn-toggle-pin span');
    if (icon) icon.textContent = 'visibility_off';
  }

  function routeProfile(profile) {
    if (profile.pin_is_temp) {
      window.location.href = 'ganti-pin.html';
      return;
    }
    if (profile.role === 'produksi_delivery') {
      renderUserHeader(profile); 
      showScreen('screen-pilih-fungsi');
      return;
    }
    redirectByRole(profile.role);
  }

  function showLoginForm() {
    const lastEmail = localStorage.getItem(LAST_EMAIL_KEY);
    showScreen('screen-login');
    if (lastEmail) {
      document.getElementById('input-email').value = lastEmail;
      adjustPinField();
      document.getElementById('input-pin').focus();
    } else {
      document.getElementById('input-email').focus();
    }
  }

  async function submitLogin() {
    const email = document.getElementById('input-email').value.trim();
    const pin = document.getElementById('input-pin').value;
    document.getElementById('error-login').classList.add('hidden');

    if (!email || !pin) {
      showError('error-login', 'Email dan PIN/Password wajib diisi.');
      return;
    }

    const btn = document.getElementById('btn-masuk');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.innerHTML = '<div class="inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';

    const { error } = await supabaseClient.auth.signInWithPassword({ email: email, password: pin });

    if (error) {
      btn.disabled = false;
      btn.textContent = originalText;
      showError('error-login', 'Email atau PIN/Password salah.');
      document.getElementById('input-pin').value = '';
      document.getElementById('input-pin').focus();
      return;
    }

    localStorage.setItem(LAST_EMAIL_KEY, email);

    const profile = await getProfile();
    if (!profile) {
      btn.disabled = false;
      btn.textContent = originalText;
      showError('error-login', 'Gagal ambil data user. Hubungi Admin.');
      return;
    }
    routeProfile(profile);
  }

  document.addEventListener('DOMContentLoaded', function () {
    const emailField = document.getElementById('input-email');
    const pinField = document.getElementById('input-pin');

    emailField.addEventListener('input', adjustPinField);

    pinField.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submitLogin();
    });

    pinField.addEventListener('input', function () {
      if (pinField.type === 'tel') {
        pinField.value = pinField.value.replace(/\D/g, '').slice(0, 6);
      }
    });
  });

  (async () => {
    const profile = await getProfile();
    if (profile) {
      routeProfile(profile);
    } else {
      showLoginForm();
    }
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
