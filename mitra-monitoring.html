<style>

        .badge {

            border-radius: 0.5rem;

        }
        
        .badge-success { background: #EAF3DE; color: #3B6D11; }

            box-shadow: 0 4px 20px -2px rgba(0, 26, 114, 0.06);
        }

            background: linear-gradient(135deg, #001a72 0%, #00114d 100%);

        @keyframes fadeUp {

            to { opacity: 1; transform: translateY(0); }

        .animate-fade-up { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

<div class="max-w-xl mx-auto flex items-center justify-between">

<img alt="Avatar" class="w-full h-full object-cover rounded-full" id="user-avatar-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFoX6P98vkfp2_v9kF3wOIfVkCyK0Yh6sKX9I5oifv_EtLRbxh0WR_Ke0Cowe_xRzb9PYlkVbJ1WFhD6gTo1Q0KrmQ_Z8Wyq2PMCKN3J8e3hXrvTre5pgIzWt-RY-X0kUPgK7bDiO3AmnqteIY4V3pplwAdSVjJsuaHAkZ8YMxJeQ86qPj8Yhyb7t3efgfVYOtXOzp-MWOKg0X3Ga8bQ9gFb_H_6yDSGSEaVUQaPI2K8gEBx976nXNfVXzS_wIC71qon4"/>
</div>
</a>
<div class="flex flex-col items-center text-center">
<h1 class="text-xs font-bold tracking-widest uppercase opacity-70 mb-0.5">MONITORING SAYA</h1>
<p class="text-sm font-bold" id="nama-user">Memuat...</p>
</div>
<a class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/10 hover:bg-white/20 transition-colors" href="index.html">
<span class="material-symbols-outlined text-white">arrow_back</span>
</a>
</div>
</header>
<main class="max-w-xl mx-auto p-4 pb-24">
<!-- Filter Section -->
<div class="bg-surface rounded-2xl p-4 card-shadow mb-6 border border-outline-variant/50 animate-fade-up">
<div class="flex items-center justify-between mb-4">
<div>
<h2 class="font-headline text-xl text-primary font-bold">Log Pengiriman</h2>
<p class="text-[11px] text-on-surface-variant/60 font-semibold uppercase tracking-wider">Histori Real-time</p>
</div>
<div class="relative">
<input class="block w-full px-3 py-2 text-xs font-bold border-outline-variant rounded-lg focus:ring-accent focus:border-accent bg-background text-primary" id="date-picker" type="date"/>
</div>
</div>
<!-- Search/Summary Placeholder if needed -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<span class="flex-none bg-primary/5 text-primary text-[10px] font-bold px-3 py-1.5 rounded-full border border-primary/10">Semua Lokasi</span>
<span class="flex-none bg-background text-on-surface-variant/60 text-[10px] font-bold px-3 py-1.5 rounded-full border border-outline-variant">Tahanan</span>
<span class="flex-none bg-background text-on-surface-variant/60 text-[10px] font-bold px-3 py-1.5 rounded-full border border-outline-variant">Anggota</span>
</div>
</div>
<!-- Data List -->
<div class="space-y-4" id="monitoring-list">
<!-- Loading State -->
<div class="flex flex-col items-center justify-center py-20 text-on-surface-variant/40">
<span class="material-symbols-outlined animate-spin text-accent text-4xl mb-4">progress_activity</span>
<p class="text-xs font-bold uppercase tracking-widest">Memuat Data...</p>
</div>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
    let currentProfile = null;

    const namaMeal = { pagi: 'Pagi', siang: 'Siang', malam: 'Malam' };
    const namaProduk = { tahanan: 'Tahanan', anggota: 'Anggota' };
    const mealOrder = { pagi: 0, siang: 1, malam: 2 };

    function todayStr() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function computeStatusSiklus(row) {
        if (!row.log_id) return { label: 'Belum Produksi', cls: 'badge-neutral', icon: 'pending' };
        const sudahDikirim = row.qty_received !== null;
        if (row.status === 'approved') return { label: 'Selesai', cls: 'badge-success', icon: 'check_circle' };
        if (sudahDikirim) return { label: 'Terkirim', cls: 'badge-warning', icon: 'local_shipping' };
        return { label: 'Siap Kirim', cls: 'badge-warning', icon: 'inventory_2' };
    }

    async function loadData() {
        const tanggal = document.getElementById('date-picker').value;
        const listContainer = document.getElementById('monitoring-list');
        listContainer.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-on-surface-variant/40">
                <span class="material-symbols-outlined animate-spin text-accent text-4xl mb-4">progress_activity</span>
                <p class="text-xs font-bold uppercase tracking-widest">Memperbarui...</p>
            </div>`;

        const { data: locationProducts, error: lpError } = await supabaseClient
            .from('location_products')
            .select('location_id, product_type, meal_time, locations(nama, route_id)')
            .order('location_id');

        if (lpError) {
            listContainer.innerHTML = `<div class="p-8 text-center text-red-600 text-sm font-bold">Gagal memuat: ${lpError.message}</div>`;
            return;
        }

        const scoped = locationProducts.filter(lp => lp.locations.route_id === currentProfile.assigned_route_id);

        if (scoped.length === 0) {
            listContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-on-surface-variant/40">
                    <span class="material-symbols-outlined text-4xl mb-2">location_off</span>
                    <p class="text-xs font-bold uppercase tracking-widest text-center px-8">Tidak ada lokasi rute yang ditugaskan.</p>
                </div>`;
            return;
        }

        const { data: prodLogs, error: plError } = await supabaseClient
            .from('production_logs')
            .select('id, location_id, product_type, meal_time, qty_produced, status')
            .eq('tanggal', tanggal);

        if (plError) {
            listContainer.innerHTML = `<div class="p-8 text-center text-red-600 text-sm font-bold">Gagal memuat produksi: ${plError.message}</div>`;
            return;
        }

        const prodLogIds = prodLogs.map(p => p.id);
        let deliveryLogs = [];
        if (prodLogIds.length > 0) {
            const { data, error: dlError } = await supabaseClient
                .from('delivery_logs')
                .select('production_log_id, qty_received, retur, photo_url, gps_lat, gps_lng, receiver_name')
                .in('production_log_id', prodLogIds);
            if (!dlError) deliveryLogs = data;
        }

        const rows = scoped.map(lp => {
            const prod = prodLogs.find(p => p.location_id === lp.location_id && p.product_type === lp.product_type && p.meal_time === lp.meal_time);
            const delivery = prod ? deliveryLogs.find(d => d.production_log_id === prod.id) : null;
            return {
                location_nama: lp.locations.nama,
                product_type: lp.product_type,
                meal_time: lp.meal_time,
                log_id: prod ? prod.id : null,
                qty_produced: prod ? prod.qty_produced : null,
                status: prod ? prod.status : null,
                qty_received: delivery ? delivery.qty_received : null,
                retur: delivery ? delivery.retur : null,
                receiver_name: delivery ? delivery.receiver_name : null,
                photo_url: delivery ? delivery.photo_url : null,
                gps_lat: delivery ? delivery.gps_lat : null,
                gps_lng: delivery ? delivery.gps_lng : null
            };
        });

        rows.sort((a, b) => {
            const locCompare = a.location_nama.localeCompare(b.location_nama);
            if (locCompare !== 0) return locCompare;
            if (a.product_type !== b.product_type) return a.product_type.localeCompare(b.product_type);
            return mealOrder[a.meal_time] - mealOrder[b.meal_time];
        });

        renderList(rows);
    }

    function renderList(rows) {
        const listContainer = document.getElementById('monitoring-list');
        listContainer.innerHTML = '';

        rows.forEach((row, idx) => {
            const siklus = computeStatusSiklus(row);
            const card = document.createElement('div');
            card.className = `bg-surface rounded-2xl p-4 card-shadow border border-outline-variant/40 animate-fade-up`;
            card.style.animationDelay = `${idx * 0.05}s`;

            const photoHtml = row.photo_url 
                ? `<a href="${row.photo_url}" target="_blank" class="flex items-center gap-1 text-accent font-bold text-[10px] uppercase">
                    <span class="material-symbols-outlined text-sm">image</span> Foto
                   </a>` 
                : `<span class="text-on-surface-variant/30 text-[10px] font-bold uppercase">No Foto</span>`;

            const gpsHtml = (row.gps_lat && row.gps_lng)
                ? `<a href="https://www.google.com/maps?q=${row.gps_lat},${row.gps_lng}" target="_blank" class="flex items-center gap-1 text-primary font-bold text-[10px] uppercase">
                    <span class="material-symbols-outlined text-sm">location_on</span> Maps
                   </a>`
                : `<span class="text-on-surface-variant/30 text-[10px] font-bold uppercase">No GPS</span>`;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h3 class="text-primary font-bold text-sm leading-tight mb-1">${row.location_nama}</h3>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-wider">${namaProduk[row.product_type]} • ${namaMeal[row.meal_time]}</span>
                        </div>
                    </div>
                    <span class="badge ${siklus.cls} flex items-center gap-1">
                        <span class="material-symbols-outlined text-[12px]">${siklus.icon}</span>
                        ${siklus.label}
                    </span>
                </div>

                <div class="grid grid-cols-3 gap-2 bg-background rounded-xl p-3 mb-3">
                    <div class="text-center border-r border-outline-variant/50">
                        <p class="text-[9px] font-bold text-on-surface-variant/50 uppercase mb-0.5">Produksi</p>
                        <p class="text-sm font-bold text-primary">${row.qty_produced || '—'}</p>
                    </div>
                    <div class="text-center border-r border-outline-variant/50">
                        <p class="text-[9px] font-bold text-on-surface-variant/50 uppercase mb-0.5">Terima</p>
                        <p class="text-sm font-bold text-primary">${row.qty_received || '—'}</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] font-bold text-on-surface-variant/50 uppercase mb-0.5">Retur</p>
                        <p class="text-sm font-bold ${row.retur > 0 ? 'text-secondary' : 'text-primary'}">${row.retur !== null ? row.retur : '—'}</p>
                    </div>
                </div>

                <div class="flex items-center justify-between border-t border-outline-variant/40 pt-3">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span class="material-symbols-outlined text-on-surface-variant/40 text-sm">person</span>
                        <span class="text-[11px] font-medium text-on-surface-variant truncate max-w-[120px]">${row.receiver_name || 'Belum diterima'}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        ${photoHtml}
                        ${gpsHtml}
                    </div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    (async () => {
        currentProfile = await requireAuth(['produksi_delivery']);
        if (currentProfile) {
            renderUserHeader(currentProfile);
            document.getElementById('date-picker').value = todayStr();
            document.getElementById('date-picker').addEventListener('change', loadData);
            loadData();
        }
    })();

    function renderUserHeader(profile) {
        document.getElementById('nama-user').textContent = (profile.full_name || 'Staff SM').toUpperCase();
    }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
</body></html>
