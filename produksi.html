<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
  let currentProfile = null;
  let scopedLP = [];
  let logsForDate = [];
  let selectedDate = null;
  let selectedProduct = null;
  let selectedJadwal = null;

  const namaMeal = { pagi: 'Pagi', siang: 'Siang', malam: 'Malam' };
  const namaProduk = { tahanan: 'Makan Tahanan', anggota: 'Makan Anggota' };
  const iconProduk = { tahanan: 'flatware', anggota: 'groups' };
  const urutanJadwal = ['pagi', 'siang', 'malam'];
  const urutanProduk = ['tahanan', 'anggota'];

  function todayStr() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function handleGlobalBack() {
    if (selectedJadwal) {
      renderScreenB();
    } else if (selectedProduct) {
      renderScreenA();
    } else {
      window.location.href = 'index.html';
    }
  }

  function updateBackButtonIcon() {
    const btn = document.getElementById('btn-global-back');
    if (!btn) return;
    btn.innerHTML = selectedProduct
      ? '<span class="material-symbols-outlined text-[20px]">arrow_back</span>'
      : '<span class="material-symbols-outlined text-[20px]">home</span>';
  }

  function showPopup(message) {
    document.getElementById('popup-message').textContent = message;
    document.getElementById('popup-overlay').classList.remove('hidden');
  }
  function closePopup() {
    document.getElementById('popup-overlay').classList.add('hidden');
  }

  function parseInputId(inputId) {
    const match = inputId.match(/^qty-(\d+)-(\w+)-(\w+)$/);
    return { locationId: match[1], productType: match[2], mealTime: match[3] };
  }

  function findLog(locationId, productType, mealTime) {
    return logsForDate.find(l => l.location_id === parseInt(locationId) && l.product_type === productType && l.meal_time === mealTime);
  }

  function hitungProgress(items) {
    const total = items.length;
    const done = items.filter(lp => !!findLog(lp.location_id, lp.product_type, lp.meal_time)).length;
    return { total, done };
  }

  function updateProgressBar(overall) {
    const pct = overall.total > 0 ? Math.round((overall.done / overall.total) * 100) : 0;
    const dateEl = document.getElementById('progress-date');
    const countEl = document.getElementById('progress-count');
    const fillEl = document.getElementById('progress-fill');
    if (dateEl) dateEl.textContent = selectedDate;
    if (countEl) countEl.textContent = `${overall.done}/${overall.total} Selesai`;
    if (fillEl) fillEl.style.width = pct + '%';
  }

  async function loadData(tanggal) {
    selectedDate = tanggal || todayStr();
    document.getElementById('main-content').innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-slate-400 italic">
        <div class="w-8 h-8 border-2 border-sm-gold/20 border-t-sm-gold rounded-full animate-spin mb-4"></div>
        <p class="text-sm">Memuat data ${selectedDate}...</p>
      </div>`;

    const { data: locationProducts, error: lpError } = await supabaseClient
      .from('location_products')
      .select('id, location_id, product_type, meal_time, qty_type, default_qty, locations(nama, route_id)')
      .order('location_id');

    if (lpError) {
      document.getElementById('main-content').innerHTML = '<div class="p-8 text-center text-red-500 font-bold">Gagal memuat lokasi.</div>';
      return;
    }

    const { data: routesData } = await supabaseClient.from('routes').select('id, is_mitra');
    const mitraRouteIds = new Set((routesData || []).filter(r => r.is_mitra).map(r => r.id));

    const { data: logsToday, error: logError } = await supabaseClient
      .from('production_logs')
      .select('id, location_id, product_type, meal_time, qty_produced, input_by, input_by_nama, status')
      .eq('tanggal', selectedDate);

    if (logError) {
      document.getElementById('main-content').innerHTML = '<div class="p-8 text-center text-red-500 font-bold">Gagal memuat log produksi.</div>';
      return;
    }

    const logIds = logsToday.map(l => l.id);
    let deliveriesByLogId = {};
    if (logIds.length > 0) {
      const { data: deliveries } = await supabaseClient
        .from('delivery_logs')
        .select('production_log_id, qty_received, retur, submitted_by_nama, receiver_status, timestamp')
        .in('production_log_id', logIds)
        .order('timestamp', { ascending: true });
      if (deliveries) {
        deliveries.forEach(d => {
          if (!deliveriesByLogId[d.production_log_id]) deliveriesByLogId[d.production_log_id] = [];
          deliveriesByLogId[d.production_log_id].push(d);
        });
      }
    }
    window.deliveriesByLogId = deliveriesByLogId;

    if (currentProfile.role === 'produksi_delivery') {
      scopedLP = locationProducts.filter(lp => lp.locations.route_id === currentProfile.assigned_route_id);
    } else if (currentProfile.role === 'produksi') {
      scopedLP = locationProducts.filter(lp => !mitraRouteIds.has(lp.locations.route_id));
    } else {
      scopedLP = locationProducts;
    }

    logsForDate = logsToday;
    const overall = hitungProgress(scopedLP);
    updateProgressBar(overall);

    selectedProduct = null;
    selectedJadwal = null;
    renderScreenA();
  }

  async function refreshLogsLalu(renderFn) {
    const { data: logsToday } = await supabaseClient
      .from('production_logs')
      .select('id, location_id, product_type, meal_time, qty_produced, input_by, input_by_nama, status')
      .eq('tanggal', selectedDate);
    if (logsToday) {
      logsForDate = logsToday;
      const logIds = logsToday.map(l => l.id);
      let deliveriesByLogId = {};
      if (logIds.length > 0) {
        const { data: deliveries } = await supabaseClient
          .from('delivery_logs')
          .select('production_log_id, qty_received, retur, submitted_by_nama, receiver_status, timestamp')
          .in('production_log_id', logIds)
          .order('timestamp', { ascending: true });
        if (deliveries) {
          deliveries.forEach(d => {
            if (!deliveriesByLogId[d.production_log_id]) deliveriesByLogId[d.production_log_id] = [];
            deliveriesByLogId[d.production_log_id].push(d);
          });
        }
      }
      window.deliveriesByLogId = deliveriesByLogId;
    }
    const overall = hitungProgress(scopedLP);
    updateProgressBar(overall);
    renderFn();
  }

  // ==== Screen A: Produk ====
  function renderScreenA() {
    selectedProduct = null;
    selectedJadwal = null;
    updateBackButtonIcon();
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'space-y-6';

    const headerSec = document.createElement('div');
    headerSec.className = 'mb-6';
    headerSec.innerHTML = `
      <div class="flex items-center gap-4 mb-6">
        <h2 class="font-serif text-2xl text-sm-blue font-bold">Produksi</h2>
      </div>
      <p class="text-slate-500 text-sm leading-relaxed">Pilih kategori menu untuk mulai mencatat jumlah produksi hari ini.</p>
    `;
    wrap.appendChild(headerSec);

    const dateCard = document.createElement('div');
    dateCard.className = 'card-premium p-4 flex items-center gap-4 mb-2';
    dateCard.innerHTML = `
      <div class="w-10 h-10 rounded-xl bg-sm-blue/5 flex items-center justify-center text-sm-blue">
        <span class="material-symbols-outlined">calendar_today</span>
      </div>
      <div class="flex-1">
        <label class="block text-[10px] text-slate-400 font-bold uppercase tracking-wider">Tanggal Produksi</label>
        <input type="date" id="input-tanggal" max="${todayStr()}" value="${selectedDate}" class="w-full bg-transparent border-none p-0 focus:ring-0 font-bold text-sm-blue text-sm">
      </div>
    `;
    wrap.appendChild(dateCard);

    if (scopedLP.length === 0) {
      wrap.innerHTML += '<div class="text-center py-12 text-slate-400 italic">Belum ada lokasi yang ditugaskan.</div>';
      container.appendChild(wrap);
      document.getElementById('input-tanggal').addEventListener('change', e => loadData(e.target.value));
      return;
    }

    const overall = hitungProgress(scopedLP);
    if (overall.total > 0 && overall.done === overall.total) {
      const banner = document.createElement('div');
      banner.className = 'bg-emerald-50 border border-emerald-100 rounded-2xl p-4 flex items-center gap-3 text-emerald-800 text-xs font-semibold';
      banner.innerHTML = '<span class="material-symbols-outlined text-emerald-600 font-bold text-lg">verified</span> Semua tugas produksi selesai';
      wrap.appendChild(banner);
    }

    const produkColor = {
      tahanan: { border: 'border-l-rose-400', iconBg: 'bg-rose-50', iconText: 'text-rose-600' },
      anggota: { border: 'border-l-violet-400', iconBg: 'bg-violet-50', iconText: 'text-violet-600' }
    };

    urutanProduk.forEach(pt => {
      const items = scopedLP.filter(lp => lp.product_type === pt);
      if (items.length === 0) return;
      const prog = hitungProgress(items);
      const isDone = prog.done === prog.total;
      const warna = produkColor[pt];

      const card = document.createElement('button');
      card.className = `w-full text-left card-premium p-5 flex items-center justify-between border-l-4 ${warna.border}`;
      card.innerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl ${warna.iconBg} ${warna.iconText} flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl">${iconProduk[pt]}</span>
          </div>
          <div>
            <h3 class="font-bold text-sm-blue text-[15px] leading-tight mb-1">${namaProduk[pt]}</h3>
            <div class="flex items-center gap-2">
               <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full uppercase tracking-tight">${prog.done} / ${prog.total} Lokasi</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${isDone ? '<span class="material-symbols-outlined text-emerald-500 font-bold">check_circle</span>' : '<span class="material-symbols-outlined text-slate-300">chevron_right</span>'}
        </div>
      `;
      card.onclick = () => { selectedProduct = pt; renderScreenB(); };
      wrap.appendChild(card);
    });

    container.appendChild(wrap);
    document.getElementById('input-tanggal').addEventListener('change', e => loadData(e.target.value));
  }

  // ==== Screen B: Jadwal ====
  function renderScreenB() {
    selectedJadwal = null;
    updateBackButtonIcon();
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'space-y-6';

    const headerRow = document.createElement('div');
    headerRow.className = 'flex flex-col gap-4 mb-2';
    headerRow.innerHTML = `
      <div>
        <h2 class="font-serif text-2xl text-sm-blue font-bold">${namaProduk[selectedProduct]}</h2>
        <p class="text-slate-500 text-sm">Pilih waktu makan untuk input data.</p>
      </div>
    `;
    wrap.appendChild(headerRow);

    const items = scopedLP.filter(lp => lp.product_type === selectedProduct);

    const jadwalColor = {
      pagi: { border: 'border-l-amber-400', iconBg: 'bg-amber-50', iconText: 'text-amber-600' },
      siang: { border: 'border-l-sky-400', iconBg: 'bg-sky-50', iconText: 'text-sky-600' },
      malam: { border: 'border-l-indigo-400', iconBg: 'bg-indigo-50', iconText: 'text-indigo-600' }
    };

    urutanJadwal.forEach(jt => {
      const subset = items.filter(lp => lp.meal_time === jt);
      if (subset.length === 0) return;
      const prog = hitungProgress(subset);
      const isDone = prog.done === prog.total;
      const warna = jadwalColor[jt];

      const card = document.createElement('button');
      card.className = `w-full text-left card-premium p-5 flex items-center justify-between border-l-4 ${warna.border}`;
      card.innerHTML = `
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 rounded-full ${warna.iconBg} ${warna.iconText} flex items-center justify-center">
            <span class="material-symbols-outlined text-xl">${jt === 'pagi' ? 'wb_twilight' : jt === 'siang' ? 'light_mode' : 'dark_mode'}</span>
          </div>
          <div>
            <h3 class="font-bold text-sm-blue text-base">${namaMeal[jt]}</h3>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${prog.done} dari ${prog.total} Selesai</p>
          </div>
        </div>
        ${isDone ? '<span class="material-symbols-outlined text-emerald-500 font-bold">check_circle</span>' : '<span class="material-symbols-outlined text-slate-300">chevron_right</span>'}
      `;
      card.onclick = () => { selectedJadwal = jt; renderScreenC(); };
      wrap.appendChild(card);
    });

    container.appendChild(wrap);
  }

  // ==== Screen C: Input List ====
  function renderScreenC() {
    updateBackButtonIcon();
    const container = document.getElementById('main-content');
    container.innerHTML = '';

    const wrap = document.createElement('div');
    wrap.className = 'space-y-6';

    const headerRow = document.createElement('div');
    headerRow.className = 'flex flex-col gap-4 mb-4';
    headerRow.innerHTML = `
      <div class="flex justify-between items-start">
        <div>
          <h2 class="font-serif text-2xl text-sm-blue font-bold">${namaMeal[selectedJadwal]}</h2>
          <p class="text-sm-gold font-bold text-[10px] uppercase tracking-[0.15em]">${namaProduk[selectedProduct]}</p>
        </div>
        <div class="bg-sm-blue-dark text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest">Input Porsi</div>
      </div>
    `;
    wrap.appendChild(headerRow);

    const items = scopedLP
      .filter(lp => lp.product_type === selectedProduct && lp.meal_time === selectedJadwal)
      .sort((a, b) => a.locations.nama.localeCompare(b.locations.nama));

    items.forEach(lp => {
      const inputId = `qty-${lp.location_id}-${lp.product_type}-${lp.meal_time}`;
      const log = findLog(lp.location_id, lp.product_type, lp.meal_time);

      const card = document.createElement('div');
      card.className = `relative card-premium overflow-hidden border-l-4 ${log ? 'border-l-emerald-500' : 'border-l-slate-200'}`;

      if (log && log.status === 'approved') {
        const stamp = document.createElement('div');
        stamp.className = 'absolute top-3 right-3 pointer-events-none z-10';
        stamp.innerHTML = `
          <div class="w-7 h-7 rounded-full bg-emerald-50 border-2 border-emerald-500 flex items-center justify-center">
            <span class="material-symbols-outlined text-emerald-500 text-base font-bold">check</span>
          </div>
        `;
        card.appendChild(stamp);
      }

      const mainSection = document.createElement('div');
      mainSection.className = 'p-5 flex items-center justify-between gap-4';

      const titlePart = document.createElement('div');
      titlePart.className = 'flex-1';
      titlePart.innerHTML = `
        <h4 class="font-bold text-sm-blue text-sm leading-snug mb-1">${lp.locations.nama}</h4>
        <p class="text-[10px] text-slate-400 font-medium">Default: ${lp.default_qty || 0}</p>
      `;
      mainSection.appendChild(titlePart);

      const actionPart = document.createElement('div');
      actionPart.className = 'w-24 shrink-0 flex flex-col items-center gap-1.5';
      mainSection.appendChild(actionPart);

      card.appendChild(mainSection);

      const meta = document.createElement('div');
      meta.className = 'bg-slate-50/50 px-5 py-2.5 border-t border-slate-100 flex flex-wrap gap-2 items-center';
      let metaHtml = '';
      if (log && log.input_by_nama) {
        metaHtml += `<span class="px-2 py-0.5 bg-white text-[9px] font-bold text-slate-500 rounded border border-slate-200 uppercase tracking-tighter">${log.input_by_nama}</span>`;
      }
      const deliveries = log ? ((window.deliveriesByLogId || {})[log.id] || []) : [];
      if (deliveries.length > 0) {
        const totalDiterima = deliveries.reduce((sum, d) => sum + d.qty_received, 0);
        const totalRetur = deliveries.reduce((sum, d) => sum + (d.retur || 0), 0);
        metaHtml += `<span class="px-2 py-0.5 bg-emerald-50 text-[9px] font-bold text-emerald-600 rounded border border-emerald-100 uppercase tracking-tighter">${totalDiterima} Porsi</span>`;
        const namaKurir = [...new Set(deliveries.map(d => d.submitted_by_nama).filter(Boolean))];
        namaKurir.forEach(n => {
          metaHtml += `<span class="px-2 py-0.5 bg-sky-50 text-[9px] font-bold text-sky-600 rounded border border-sky-100 uppercase tracking-tighter">${n}</span>`;
        });
        if (totalRetur > 0) {
          metaHtml += `<span class="px-2 py-0.5 bg-amber-50 text-[9px] font-bold text-amber-700 rounded border border-amber-100 uppercase tracking-tighter">Retur: ${totalRetur}</span>`;
        }
        if (log) {
          const sisa = log.qty_produced - totalDiterima;
          if (sisa > 0) {
            metaHtml += `<span class="px-2 py-0.5 bg-orange-100 text-[9px] font-bold text-orange-700 rounded border border-orange-200 uppercase tracking-tighter">Sisa: ${sisa} Porsi</span>`;
          }
        }
      }
      if (!metaHtml) metaHtml = '<span class="text-[9px] text-slate-400 italic uppercase font-bold tracking-tighter">Status: Belum Input</span>';
      meta.innerHTML = metaHtml;
      card.appendChild(meta);

      const errorDiv = document.createElement('div');
      errorDiv.className = 'bg-red-50 text-red-600 text-[10px] px-5 py-1.5 hidden font-bold text-center';
      errorDiv.id = `err-${inputId}`;
      card.appendChild(errorDiv);

      if (log) {
        const bisaEdit = log.input_by === currentProfile.id && log.status === 'pending';
        renderDoneState(actionPart, inputId, log.qty_produced, bisaEdit, log.id);
      } else {
        renderInputState(actionPart, inputId, null);
      }

      wrap.appendChild(card);
    });

    container.appendChild(wrap);
  }

  function renderDoneState(content, inputId, qty, bisaEdit, logId) {
    content.innerHTML = '';
    const badge = document.createElement('div');
    badge.className = 'h-10 w-full bg-emerald-50 border border-emerald-100 rounded-xl flex items-center justify-center font-bold text-emerald-700 text-lg';
    badge.textContent = qty;
    content.appendChild(badge);

    if (bisaEdit) {
      const editBtn = document.createElement('button');
      editBtn.className = 'text-[9px] font-bold text-sm-blue/60 uppercase tracking-widest active:text-sm-gold py-1';
      editBtn.textContent = 'Edit Data';
      editBtn.onclick = () => renderInputState(content, inputId, { qty, logId });
      content.appendChild(editBtn);
    }
  }

  function renderInputState(content, inputId, editData) {
    content.innerHTML = '';
    const isEdit = !!editData;
    const prefill = isEdit ? editData.qty : '';

    const input = document.createElement('input');
    input.type = 'number';
    input.id = inputId;
    input.value = prefill;
    input.placeholder = '0';
    input.className = 'h-10 w-full text-center bg-slate-50 border-slate-200 focus:border-sm-gold focus:ring-0 font-bold text-sm-blue text-base rounded-xl';
    content.appendChild(input);

    const btn = document.createElement('button');
    btn.className = `h-9 w-full ${isEdit ? 'bg-sm-blue' : 'bg-sm-gold'} text-white rounded-lg text-[10px] font-bold uppercase tracking-widest active:scale-95 transition-all`;
    btn.id = `btn-${inputId}`;
    btn.textContent = isEdit ? 'Simpan' : 'Input';
    btn.onclick = () => submitQty(inputId, isEdit ? editData.logId : null);
    content.appendChild(btn);

    if (isEdit) {
      const batalBtn = document.createElement('button');
      batalBtn.className = 'text-[9px] font-bold text-slate-400 uppercase tracking-widest active:text-slate-600 py-1';
      batalBtn.textContent = 'Batal';
      batalBtn.onclick = () => renderDoneState(content, inputId, editData.qty, true, editData.logId);
      content.appendChild(batalBtn);
    }
  }

  async function submitQty(inputId, logId) {
    const { locationId, productType, mealTime } = parseInputId(inputId);
    const input = document.getElementById(inputId);
    const errorDiv = document.getElementById(`err-${inputId}`);
    const btn = document.getElementById(`btn-${inputId}`);
    const qty = parseInt(input.value, 10);

    errorDiv.classList.add('hidden');

    if (isNaN(qty) || qty < 0) {
      errorDiv.textContent = 'Isi angka yang valid.';
      errorDiv.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.innerHTML = '<div class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin mx-auto"></div>';

    if (logId) {
      const { data, error } = await supabaseClient
        .from('production_logs')
        .update({ qty_produced: qty })
        .eq('id', logId)
        .select();

      if (error) {
        btn.disabled = false;
        btn.textContent = originalText;
        errorDiv.textContent = 'Gagal: ' + error.message;
        errorDiv.classList.remove('hidden');
        return;
      }
      showPopup('Perubahan jumlah produksi disimpan.');
    } else {
      const { error } = await supabaseClient.from('production_logs').insert({
        tanggal: selectedDate,
        location_id: parseInt(locationId, 10),
        product_type: productType,
        meal_time: mealTime,
        qty_produced: qty,
        input_by: currentProfile.id,
        input_by_nama: currentProfile.nama
      });

      if (error) {
        btn.disabled = false;
        btn.textContent = originalText;
        errorDiv.textContent = error.code === '23505' ? 'Sudah pernah diisi.' : 'Gagal simpan data.';
        errorDiv.classList.remove('hidden');
        return;
      }
      showPopup('Data produksi berhasil disimpan.');
    }

    refreshLogsLalu(renderScreenC);
  }

  (async () => {
    currentProfile = await requireAuth(['produksi', 'produksi_delivery']);
    if (currentProfile) {
      const initial = currentProfile.nama ? currentProfile.nama.charAt(0).toUpperCase() : 'U';
      const initialEl = document.getElementById('avatar-mini-initial');
      const namaEl = document.getElementById('nama-user');
      const roleEl = document.getElementById('role-user');

      if (initialEl) initialEl.textContent = initial;
      if (namaEl) namaEl.textContent = currentProfile.nama || 'User';
      if (roleEl) roleEl.textContent = currentProfile.role.replace('_', ' ');

      if (currentProfile.foto_url) {
        const imgEl = document.getElementById('avatar-mini-img');
        imgEl.src = currentProfile.foto_url;
        imgEl.classList.remove('hidden');
        if (initialEl) initialEl.classList.add('hidden');
      }

      if (currentProfile.role === 'produksi_delivery') {
        document.getElementById('menu-link').classList.remove('hidden');
      }

      loadData(todayStr());
    }
  })();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    });
  }
</script>
