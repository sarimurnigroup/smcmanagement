<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-client.js"></script>
<script src="auth-guard.js"></script>
<script>
        const CLOUDINARY_CLOUD_NAME = 'w21mapdh';
        const CLOUDINARY_UPLOAD_PRESET = 'smc-management-system';

        let currentProfile = null;
        const namaRole = {
            superuser: 'Superuser', admin: 'Admin', produksi: 'Produksi',
            delivery: 'Delivery', produksi_delivery: 'Mitra'
        };

        function kembaliKeDashboard() {
            // Animasi tutup sebelum redirect
            const content = document.getElementById('modal-content');
            const overlay = document.getElementById('modal-overlay');
            content.style.transition = 'all 0.25s ease-out';
            content.style.opacity = '0';
            content.style.transform = 'scale(0.9) translate(-20px, -20px)';
            overlay.style.transition = 'opacity 0.2s ease-out';
            overlay.style.opacity = '0';

            setTimeout(() => {
                if (!currentProfile) { window.location.href = 'index.html'; return; }
                if (currentProfile.role === 'produksi_delivery') {
                    window.location.href = 'index.html';
                } else {
                    redirectByRole(currentProfile.role);
                }
            }, 250);
        }

        function showMsg(elId, pesan, isError) {
            const el = document.getElementById(elId);
            el.textContent = pesan;
            el.classList.remove('hidden');
        }
        function hideMsg(elId) {
            const el = document.getElementById(elId);
            el.classList.add('hidden');
        }

        function isiForm(profile) {
            document.getElementById('input-nama').value = profile.nama || '';
            document.getElementById('text-email').textContent = profile.email || '-';
            document.getElementById('input-no-wa').value = profile.no_wa || '';
            document.getElementById('input-no-ktp').value = profile.no_ktp || '';
            document.getElementById('role-badge').textContent = namaRole[profile.role] || profile.role;

            const headerNameEl = document.getElementById('header-user-name');
            if (headerNameEl) headerNameEl.textContent = profile.nama || 'Profil Pengguna';

            const headerImgEl = document.getElementById('header-avatar-img');
            const headerInitialEl = document.getElementById('header-avatar-initial');

            const initialEl = document.getElementById('avatar-initial');
            const imgEl = document.getElementById('avatar-img');
            if (profile.foto_url) {
                imgEl.src = profile.foto_url;
                imgEl.classList.remove('hidden');
                initialEl.classList.add('hidden');
                if (headerImgEl && headerInitialEl) {
                    headerImgEl.src = profile.foto_url;
                    headerImgEl.classList.remove('hidden');
                    headerInitialEl.classList.add('hidden');
                }
            } else {
                imgEl.classList.add('hidden');
                initialEl.classList.remove('hidden');
                initialEl.textContent = (profile.nama || '?').trim().charAt(0).toUpperCase();
                if (headerImgEl && headerInitialEl) {
                    headerImgEl.classList.add('hidden');
                    headerInitialEl.classList.remove('hidden');
                    headerInitialEl.textContent = (profile.nama || '?').trim().charAt(0).toUpperCase();
                }
            }

            const pinBaru = document.getElementById('input-pin-baru');
            const pinKonfirmasi = document.getElementById('input-pin-konfirmasi');
            if (profile.role === 'superuser') {
                document.getElementById('judul-ganti-pin').textContent = 'KEAMANAN PASSWORD';
                document.getElementById('label-pin-baru').textContent = 'Password Baru';
                document.getElementById('label-pin-konfirmasi').textContent = 'Ulangi Password Baru';
                [pinBaru, pinKonfirmasi].forEach(function (el) {
                    el.type = 'password';
                    el.removeAttribute('inputmode');
                    el.removeAttribute('pattern');
                    el.removeAttribute('maxlength');
                    el.classList.remove('tracking-[0.5em]');
                });
                document.getElementById('btn-simpan-pin').textContent = 'Simpan Password Baru';
            }
        }

        async function simpanProfil() {
            hideMsg('error-profil'); hideMsg('success-profil');
            const nama = document.getElementById('input-nama').value.trim();
            const noWa = document.getElementById('input-no-wa').value.trim();
            const noKtp = document.getElementById('input-no-ktp').value.trim();

            if (!nama) {
                showMsg('error-profil', 'Nama tidak boleh kosong.');
                return;
            }

            const btn = document.getElementById('btn-simpan-profil');
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            const { error } = await supabaseClient
                .from('users')
                .update({ nama: nama, no_wa: noWa || null, no_ktp: noKtp || null })
                .eq('id', currentProfile.id);

            btn.disabled = false;
            btn.textContent = 'Perbarui Profil';

            if (error) {
                showMsg('error-profil', 'Gagal simpan: ' + error.message);
                return;
            }
            currentProfile.nama = nama;
            currentProfile.no_wa = noWa;
            currentProfile.no_ktp = noKtp;
            document.getElementById('avatar-initial').textContent = nama.charAt(0).toUpperCase();
            showMsg('success-profil', 'Profil berhasil disimpan.');
        }

        async function simpanPinBaru() {
            hideMsg('error-pin'); hideMsg('success-pin');
            const p1 = document.getElementById('input-pin-baru').value;
            const p2 = document.getElementById('input-pin-konfirmasi').value;
            const isSuperuser = currentProfile.role === 'superuser';

            if (isSuperuser) {
                if (p1.length < 6) {
                    showMsg('error-pin', 'Password minimal 6 karakter.');
                    return;
                }
            } else if (!/^\d{6}$/.test(p1)) {
                showMsg('error-pin', 'PIN harus 6 digit angka.');
                return;
            }
            if (p1 !== p2) {
                showMsg('error-pin', 'Konfirmasi tidak cocok.');
                return;
            }

            const btn = document.getElementById('btn-simpan-pin');
            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            const { error } = await supabaseClient.auth.updateUser({ password: p1 });

            btn.disabled = false;
            btn.textContent = isSuperuser ? 'Simpan Password Baru' : 'Simpan PIN Baru';

            if (error) {
                showMsg('error-pin', 'Gagal ganti: ' + error.message);
                return;
            }
            document.getElementById('input-pin-baru').value = '';
            document.getElementById('input-pin-konfirmasi').value = '';
            showMsg('success-pin', isSuperuser ? 'Password berhasil diganti.' : 'PIN berhasil diganti.');
        }

        async function uploadToCloudinary(blob, folderPath) {
            const formData = new FormData();
            formData.append('file', blob);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', folderPath);
            const response = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD_NAME + '/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error((data.error && data.error.message) || 'Upload foto gagal');
            return data.secure_url;
        }

        async function compressPhoto(file, maxSizeKB, maxDimension) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = Math.round(height * (maxDimension / width));
                            width = maxDimension;
                        } else {
                            width = Math.round(width * (maxDimension / height));
                            height = maxDimension;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                    let quality = 0.7;
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, 'image/jpeg', quality);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        document.addEventListener('DOMContentLoaded', async function () {
            currentProfile = await requireAuth(null);
            if (!currentProfile) return;
            isiForm(currentProfile);

            document.getElementById('input-foto').addEventListener('change', async function (e) {
                const file = e.target.files[0];
                if (!file) return;

                const imgEl = document.getElementById('avatar-img');
                const prevSrc = imgEl.src;
                imgEl.src = URL.createObjectURL(file);
                imgEl.classList.remove('hidden');
                document.getElementById('avatar-initial').classList.add('hidden');

                const status = document.getElementById('status-foto');
                status.textContent = 'Mengupload...';
                status.style.color = '#775a19';

                try {
                    const compressed = await compressPhoto(file, 200, 800);
                    const url = await uploadToCloudinary(compressed, 'avatars');
                    
                    const { error } = await supabaseClient
                        .from('users')
                        .update({ foto_url: url })
                        .eq('id', currentProfile.id);
                        
                    if (error) throw error;
                    status.textContent = 'Berhasil diupload!';
                    status.style.color = '#3B6D11';
                    currentProfile.foto_url = url;

                    const headerImgEl = document.getElementById('header-avatar-img');
                    const headerInitialEl = document.getElementById('header-avatar-initial');
                    if (headerImgEl && headerInitialEl) {
                        headerImgEl.src = url;
                        headerImgEl.classList.remove('hidden');
                        headerInitialEl.classList.add('hidden');
                    }
                } catch (err) {
                    imgEl.src = prevSrc;
                    status.textContent = 'Gagal upload: ' + (err.message || 'Terjadi kesalahan');
                    status.style.color = '#ba1a1a';
                }
            });
        });
    </script>
<script>
